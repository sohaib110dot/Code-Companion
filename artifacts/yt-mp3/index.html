    <style>
      body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;background:#fff}

      #skeleton{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;opacity:1;transition:opacity .2s}

      @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    </style>

      var ro=new MutationObserver(function(){if(document.getElementById('root').children.length){document.getElementById('skeleton').classList.add('hide');setTimeout(function(){var s=document.getElementById('skeleton');if(s)s.remove()},300);ro.disconnect()}});
      ro.observe(document.getElementById('root'),{childList:true});
    </script>
